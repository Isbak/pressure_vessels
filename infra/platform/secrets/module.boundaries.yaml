version: 1
kind: PlatformSecretsModule
metadata:
  name: platform-secrets-boundaries
spec:
  provider_modes:
    - vault
    - sops-age
  issuance_boundary:
    owner: security-platform
    contract: environment-scoped handles are issued for infra modules only
    consumers:
      - infra/platform/backend
      - infra/platform/workflow
      - infra/platform/observability
  encryption_boundary:
    at_rest:
      required: true
      allowed_materializations:
        - ciphertext
        - reference-only manifests
    in_repo_plaintext:
      allowed: false
  governance:
    provider_specific_secret_values_allowed: false
    audit_fields:
      - environment
      - module
      - secret_handle
