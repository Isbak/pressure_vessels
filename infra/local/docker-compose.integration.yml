services:
  backend:
    image: node:20-alpine
    working_dir: /workspace
    command: sh -lc "node services/backend/local-integration-server.js"
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: ${BACKEND_PORT:-8000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../../:/workspace
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1:8000/health >/dev/null || exit 1
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s

  frontend:
    image: node:20-alpine
    working_dir: /workspace
    depends_on:
      backend:
        condition: service_healthy
    command: >-
      sh -lc "
      cd services/frontend &&
      npm install &&
      npm run dev -- --hostname 0.0.0.0 --port ${FRONTEND_PORT:-3000}
      "
    environment:
      BACKEND_API_BASE_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ../../:/workspace
