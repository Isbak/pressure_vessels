repos:
  - repo: local
    hooks:
      - id: readme-anchor-check
        name: Readme anchor governance check
        entry: make g
        language: system
        pass_filenames: false
      - id: runtime-stack-check
        name: Runtime stack baseline check
        entry: make s
        language: system
        pass_filenames: false
      - id: python-style-baseline
        name: Python style baseline check
        entry: make lint-py
        language: system
        pass_filenames: false
      - id: js-ts-style-baseline
        name: JS/TS style baseline check
        entry: make lint-js
        language: system
        pass_filenames: false
