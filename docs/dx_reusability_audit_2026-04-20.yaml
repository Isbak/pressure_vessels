audit_scope:
  - Repository developer onboarding ergonomics (bootstrap, validate, local feedback loop).
  - Frontend/backend/JS toolchain parity with Python-centric DX surface.
  - Reusability of the governance baseline and platform modules in other projects
    per AGENT_GOVERNANCE.md#13 and docs/developer_experience_principles.md.
