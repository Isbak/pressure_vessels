governance:
  authoring_controls:
    - Findings are governed by AGENT_GOVERNANCE.md (risk-based merge gates, dual-agent review).
    - Each item lists acceptance_criteria and deliverables consistent with development_backlog.yaml item shape.
    - Promotion of a finding into development_backlog.yaml requires an explicit BL-* entry referencing the DXR id.
  dependency_rule: >-
    An item may only move to in_progress when all depends_on entries are done,
    mirroring tests/test_backlog_consistency.py semantics.
  prompt_flow:
