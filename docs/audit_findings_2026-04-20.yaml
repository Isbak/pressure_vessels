  - BL-013
  - BL-005
  problem: >-
    Material rules (propane, ammonia, …) are a hardcoded in-module dict with no
    standards_version or effective_date metadata. When ASME Section II updates
    allowables, the dict drifts silently until manually patched.
  risk: >-
