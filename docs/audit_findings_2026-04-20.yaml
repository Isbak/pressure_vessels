- id: AF-001
  title: Harden concurrent standards-package writes
  severity: critical
  area: knowledge
  status: done
  file_path: src/pressure_vessels/standards_ingestion_pipeline.py
  line_numbers: [180]
  depends_on: []
  references:
  - docs/runbooks/standards_ingestion_pipeline_runbook.md
  - BL-005
  problem: >-
    Immutable package artifacts are created with open(path, "x"). Two concurrent
    ingestion runs for the same package_id race; the second raises
    FileExistsError mid-write without cleanup or locking, leaving the artifact
    store in an ambiguous state.
  risk: >-
    Concurrent ingestion can corrupt the artifact store or leave half-written
    files, undermining the immutability guarantee relied on by downstream
    calculation and compliance pipelines.
  recommendation: >-
    Replace the raw exclusive-create call with an atomic write pattern
    (write-to-temp then os.replace) plus a filesystem lock or pre-write
    existence check that returns a typed collision error.
  acceptance_criteria:
  - Concurrent writes for the same package_id never leave partial files.
  - Collisions produce a typed, documented exception (not a bare FileExistsError).
  - A new concurrency stress test (see AF-009) passes deterministically.
  deliverables:
  - Atomic write helper with documented semantics
  - Updated standards ingestion pipeline call site
  - Regression test in tests/

- id: AF-002
  title: Validate geometry adapter inputs with typed errors
  severity: critical
  area: geometry
  status: done
  file_path: src/pressure_vessels/geometry_module.py
  line_numbers: [56, 66]
  depends_on: []
  references:
  - docs/interfaces/calculation_pipeline_contract.md
  - BL-014
  problem: >-
    float(geometry_input.shell_inside_diameter_m) and sibling casts raise bare
    ValueError when a non-numeric value is supplied. There is no field-level
    error message and no upstream schema gate, so malformed inputs crash the
    pipeline with unclear provenance.
  risk: >-
    Users cannot diagnose bad geometry inputs; pipeline failure modes are
    undifferentiated from genuine calculation errors, eroding trust and
    complicating the handoff gate for strict sizing input mode.
  recommendation: >-
    Introduce a GeometryInputValidationError and a validator that checks every
    required numeric field, returning an aggregated error artifact naming each
    offending field.
  acceptance_criteria:
  - All geometry float conversions go through the new validator.
  - Invalid inputs raise GeometryInputValidationError with field-level detail.
  - Tests cover non-numeric, None, and out-of-range values.
  deliverables:
  - GeometryInputValidationError class
  - Validator helper and wiring
  - Test coverage in tests/

- id: AF-003
  title: Document and justify safety-critical rounding precision
  severity: critical
  area: calculation
  status: done
  file_path: src/pressure_vessels/calculation_pipeline.py
  line_numbers: [933, 988]
  depends_on: []
  references:
  - docs/interfaces/calculation_pipeline_contract.md
  - docs/decision-log/ADR-0005-bl-003-sizing-check-scope-and-defaults.md
  - BL-003
  problem: >-
    Thickness, pressure, and utilization checks apply round(x, 9) throughout
    without a docstring or ADR explaining why nine decimals is correct,
    sufficient, or auditable against ASME code intent.
  risk: >-
    Rounding choices in safety-critical pass/fail logic are not defensible
    during certification review. Silent behavior changes if the precision is
    later adjusted without an ADR.
  recommendation: >-
    Extract rounding into a named helper with a docstring that states the
    rationale (e.g., nanometer-scale tolerance below manufacturing precision),
    add an ADR entry, and cover the boundary with regression tests.
  acceptance_criteria:
  - All round() calls in calculation_pipeline.py route through the helper.
  - Helper docstring cites the precision rationale and ADR.
  - New regression test pins the rounding behavior with reference values.
  deliverables:
  - Rounding helper + docstring
  - ADR entry in docs/decision-log/
  - Regression test in tests/

- id: AF-004
  title: Fail closed on MVP geometry defaults in production mode
  severity: critical
  area: calculation
  status: todo
  file_path: src/pressure_vessels/calculation_pipeline.py
  line_numbers: [570, 575]
  depends_on: []
  references:
  - src/pressure_vessels/calculation_pipeline.py
  - docs/architecture.md
  - BL-014
  problem: >-
    When sizing_input is missing, MVP defaults are applied and only a
    warnings.warn is emitted. Test runs already generate ~41 warnings, training
    users to ignore them; a production run can silently certify placeholder
    geometry.
  risk: >-
    Designs emitted with placeholder geometry may be treated as real by
    downstream compliance/dossier steps, invalidating any certification
    evidence tied to them.
  recommendation: >-
    Raise a typed MissingGeometryInputError by default; keep MVP defaults
    behind an explicit use_mvp_defaults opt-in kwarg that emits a logged,
    non-silent event and tags the resulting artifact as non-production.
  acceptance_criteria:
  - Default behavior with missing sizing input raises
    MissingGeometryInputError.
  - use_mvp_defaults=True tags the calculation record with a
    non_production_flag and logs an audit event.
  - Existing tests updated to opt in explicitly where MVP defaults are
    intentional.
  deliverables:
  - MissingGeometryInputError class
  - Opt-in flag wiring and audit tag
  - Updated tests + docs/architecture.md breaking-change note

