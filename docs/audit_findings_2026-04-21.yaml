- id: AF-017
  title: Handle reject-category fixtures in QA benchmark cross-verification harness
  severity: high
  area: quality
  status: done
  file_path: src/pressure_vessels/qa_benchmark_pipeline.py
  line_numbers: [88, 103]
  depends_on:
  - AF-016
  references:
  - tests/golden_examples/benchmark_manifest.json
  - tests/golden_examples/reject_envelope_cases.json
  - docs/interfaces/qa_benchmark_quality_gate_contract.md
  - BL-017
  - BL-041
  problem: >-
    `run_cross_verification_harness` unconditionally reads
    `fixture["input"]` for every case in the benchmark manifest. The manifest
    now includes a reject-category case (`reject_envelope_cases`) whose
    fixture has no `input` key (it carries a `cases[]` list of dimension/value
    probes instead). The harness raises KeyError('input') on that case and
    never evaluates the BL-041 reject envelope in CI.
  risk: >-
    The reject-envelope discipline introduced by BL-041 is silently skipped
    in the automated quality gate. Regressions to the BL-003e validity
    envelope would not be caught by the harness, undermining the
    fail-closed-on-invalid-domain guarantee.
  recommendation: >-
    Branch on `case.category`. For category `reject`, load
    `fixture["cases"]` and assert that `run_calculation_pipeline` raises a
    matching domain-gate exception for each dimension/value probe. Emit a
    reject-specific case payload shape in the quality-gate report and update
    `docs/interfaces/qa_benchmark_quality_gate_contract.md` to enumerate the
    `reject` category.
  acceptance_criteria:
  - Cross-verification harness runs deterministically across all manifest
    categories (golden, boundary, stress, reject).
  - Report payload documents a `reject` case shape that is stable across
    reruns.
  - Regression test exercises the reject fixture and fails if the envelope
    guard is relaxed.
  deliverables:
  - Updated harness with category-aware case dispatch
  - Contract/doc update for the reject category
  - Regression tests in tests/test_qa_benchmark_harness.py
 
