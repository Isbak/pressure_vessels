- id: AF-020
  title: Narrow broad Exception catch in standards ingestion write
  severity: medium
  area: knowledge
  status: todo
  file_path: src/pressure_vessels/standards_ingestion_pipeline.py
  line_numbers: [421]
  depends_on: []
  references:
  - AF-001
  - BL-005
  problem: >-
    The atomic-write helper added for AF-001 wraps its body in
    `except Exception:` to unlink the tempfile on any failure. The handler
    re-raises, but it also swallows and re-raises system-exit-class
    exceptions (BaseException is excluded, which is correct) without
    documenting why the broad class is necessary or logging the exception
    type.
  risk: >-
    A future refactor could inadvertently suppress an unrelated exception if
    the re-raise is dropped. Auditors reviewing the ingestion path cannot
    see at a glance why the broad catch is intentional.
  recommendation: >-
    Replace with an explicit tuple of expected exceptions (OSError,
    ValueError, json.JSONDecodeError) plus a narrow final `Exception`
    re-raise with a docstring or inline comment citing the cleanup
    invariant. Alternatively, restructure with `try/finally` so no `except`
    is needed for the cleanup path.
  acceptance_criteria:
  - Cleanup path is structurally obvious (finally-only or explicit tuple).
  - Rationale for any remaining broad catch is documented inline.
  - Existing AF-001 concurrency test remains green.
  deliverables:
  - Refactored atomic-write helper
  - Unit-test update if the exception taxonomy shifts
 
