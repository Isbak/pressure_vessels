name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify repository docs are present
        run: |
          test -f README.md
          test -f AGENT_GOVERNANCE.md
          test -f docs/development_backlog.yaml

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            README.md
            AGENT_GOVERNANCE.md
            docs/**/*.md
            .github/pull_request_template.md

  yaml-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML syntax
        run: |
          ruby - <<'RUBY'
          require "yaml"

          Dir.glob("**/*.{yml,yaml}").sort.each do |path|
            YAML.safe_load(File.read(path), permitted_classes: [], aliases: true)
          end

          puts "YAML validation passed."
          RUBY

  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          fail: true
          args: --no-progress --verbose --max-retries 3 --retry-wait-time 2 README.md AGENT_GOVERNANCE.md docs/**/*.md .github/pull_request_template.md

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
