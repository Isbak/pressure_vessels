name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify repository docs are present
        run: |
          test -f README.md
          test -f AGENT_GOVERNANCE.md
          test -f docs/development_backlog.yaml

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: "**/*.md"

  yaml-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install YAML parser dependency
        run: pip install pyyaml
      - name: Validate YAML syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in Path(".").rglob("*.yml"):
              yaml.safe_load(path.read_text(encoding="utf-8"))
          for path in Path(".").rglob("*.yaml"):
              yaml.safe_load(path.read_text(encoding="utf-8"))

          print("YAML validation passed.")
          PY

  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          fail: true
          args: --no-progress --verbose "./**/*.md"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
