name: CI

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify repository docs are present
        run: |
          test -f README.md
          test -f AGENT_GOVERNANCE.md
          test -f docs/development_backlog.yaml

  agent-governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure governance artifacts exist
        run: |
          test -f .github/pull_request_template.md
          test -f .agents/codex/AGENTS.md
          test -f .agents/claude/CLAUDE.md

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: '**/*.md'

  yaml-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML syntax
        run: |
          ruby - <<'RUBY'
          require "find"
          require "yaml"

          roots = [".github", "docs", "infra"]
          single_files = [".markdownlint-cli2.yaml", ".pre-commit-config.yaml"]

          yaml_files = []
          roots.each do |root|
            next unless File.directory?(root)
            Find.find(root) do |path|
              next if File.directory?(path)
              next unless path.end_with?(".yml", ".yaml")
              yaml_files << path
            end
          end
          single_files.each { |file| yaml_files << file if File.file?(file) }

          yaml_files.sort.uniq.each do |path|
            YAML.safe_load(File.read(path), permitted_classes: [], aliases: true)
          end

          puts "YAML validation passed for #{yaml_files.length} files."
          RUBY

  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - name: Read CI governance policy
        id: policy
        run: |
          retention="$(jq -r '.artifact_retention_days' docs/governance/ci_governance_policy.v1.json)"
          echo "retention=${retention}" >> "${GITHUB_OUTPUT}"
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest
      - name: Run unit tests
        run: |
          pytest -q --junitxml artifacts/ci/pytest-junit.xml
      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit-py${{ matrix.python-version }}
          path: artifacts/ci/pytest-junit.xml
          retention-days: ${{ steps.policy.outputs.retention }}


  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest
      - name: Run contract tests
        run: |
          pytest -q tests/test_contract_interfaces_dx009.py

  style-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package with dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run style baseline checks
        run: |
          make validate-style

  iac-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false
      - name: Set up tflint
        uses: terraform-linters/setup-tflint@v4
      - name: Check OpenTofu formatting
        run: |
          tofu fmt -check -recursive infra/platform/iac
      - name: Lint HCL under infra/platform/iac
        run: |
          # DXR-008: Until infra/platform/iac contains Terraform/OpenTofu HCL,
          # this lint step is advisory for scaffold-only contracts.
          if [ -n "$(find infra/platform/iac -type f -name '*.tf' -print -quit 2>/dev/null)" ]; then
            tflint --chdir infra/platform/iac --recursive
          else
            echo "No HCL under infra/platform/iac yet; iac-validate is advisory for scaffold-only modules."
          fi

  js-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read pinned Node version
        id: node-version
        run: |
          node_version="$(jq -r '.node' tools/versions.json)"
          if [ "$node_version" = "null" ] || [ -z "$node_version" ]; then
            echo "tools/versions.json is missing required .node pin"
            exit 1
          fi
          echo "node-version=$node_version" >> "${GITHUB_OUTPUT}"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node-version.outputs.node-version }}
      - name: Assert active Node major meets minimum pin
        run: |
          expected="${{ steps.node-version.outputs.node-version }}"
          actual="$(node -p "process.versions.node")"
          actual_major="$(node -p "process.versions.node.split('.')[0]")"
          if [ "$actual_major" -lt "$expected" ]; then
            echo "Node version too old: requires >= ${expected}.x from tools/versions.json, got ${actual}."
            exit 1
          fi
      - name: Install JS service dependencies
        run: |
          make bootstrap-js
      - name: Run JS validation checks
        run: |
          make validate-js

  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          fail: true
          failIfEmpty: false
          args: >-
            --no-progress --verbose --max-retries 3 --retry-wait-time 2
            README.md AGENT_GOVERNANCE.md docs/**/*.md .github/pull_request_template.md

  governance-gate:
    if: always()
    needs:
      - agent-governance
      - contract-tests
      - docs-check
      - iac-validate
      - markdown-lint
      - markdown-links
      - js-validate
      - style-baseline
      - python-tests
      - yaml-validate
    uses: ./.github/workflows/reusable-governance-core.yml
    with:
      ci_policy_path: docs/governance/ci_governance_policy.v1.json
      policy_exceptions_path: .github/governance/policy_exceptions.v1.json
      exceptions_schema_path: docs/governance/policy_exceptions_schema.v1.json
      backlog_path: docs/development_backlog.yaml
      tech_stack_registry_path: docs/platform_runtime_stack_registry.yaml
      environment_bootstrap_path: infra/platform/environment.bootstrap.yaml
      policy_backlog_path: docs/governance/policy_backlog.yaml
      upstream_needs_json: ${{ toJson(needs) }}
