name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify repository docs are present
        run: |
          test -f README.md
          test -f AGENT_GOVERNANCE.md
          test -f docs/development_backlog.yaml

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Markdown
        run: |
          ./markdownlint-cli2 "**/*.md"

  yaml-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML syntax
        run: |
          ruby - <<'RUBY'
          require "find"
          require "yaml"

          yaml_files = []
          Find.find(".") do |path|
            next if File.directory?(path)
            next unless path.end_with?(".yml", ".yaml")

            yaml_files << path
          end

          yaml_files.sort.each do |path|
            YAML.safe_load(File.read(path), permitted_classes: [], aliases: true)
          end

          puts "YAML validation passed for #{yaml_files.length} files."
          RUBY

  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest
      - name: Run unit tests
        run: |
          pytest -q --junitxml artifacts/ci/pytest-junit.xml
      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit
          path: artifacts/ci/pytest-junit.xml
          retention-days: 30

  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          fail: true
          failIfEmpty: false
          args: >-
            --no-progress --verbose --max-retries 3 --retry-wait-time 2
            README.md AGENT_GOVERNANCE.md docs/**/*.md .github/pull_request_template.md

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for hardcoded secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  governance-gate:
    if: always()
    needs:
      - docs-check
      - markdown-lint
      - yaml-validate
      - python-tests
      - markdown-links
      - secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Build deterministic CI gate result payload
        run: |
          mkdir -p artifacts/ci
          cat > artifacts/ci/raw-needs.json <<'JSON'
          ${{ toJson(needs) }}
          JSON
          python - <<'PY'
          import json
          from pathlib import Path

          raw = json.loads(Path("artifacts/ci/raw-needs.json").read_text(encoding="utf-8"))
          gate_results = {job_name: details["result"] for job_name, details in sorted(raw.items())}
          Path("artifacts/ci/job-results.json").write_text(
              json.dumps(gate_results, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
      - name: Enforce governance policy gates
        run: |
          python scripts/check_ci_governance.py \
            docs/governance/ci_governance_policy.v1.json \
            .github/governance/policy_exceptions.v1.json \
            artifacts/ci/job-results.json \
            artifacts/ci/GovernanceGateReport.v1.json
      - name: Upload governance audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-gate-report
          path: |
            artifacts/ci/job-results.json
            artifacts/ci/GovernanceGateReport.v1.json
          retention-days: 30
